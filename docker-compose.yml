version: '3.8'

services:

  # ── Ollama inference server ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # GPU users: uncomment the block below (requires NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Pull the model once; stored in the ollama_data volume ─────────────────
  # On first run this downloads ~2 GB. Subsequent starts are instant.
  ollama-pull:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_API_BASE=http://ollama:11434
      - LLM_MODEL=llama3.2
      - LLM_TIMEOUT=180        # CPU inference is slower; give it 3 min
      - LLM_MAX_RETRIES=2
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    restart: on-failure

  # ── Frontend (static HTML served by nginx) ─────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  ollama_data:
